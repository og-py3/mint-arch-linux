UI menu.c32

PROMPT 0
MENU TITLE Mint Arch Linux Boot Menu
TIMEOUT 50

DEFAULT live

LABEL live
    MENU LABEL Mint Arch Linux Live (KDE Plasma)
    LINUX boot/x86_64/vmlinuz-linux
    APPEND archisobasedir=arch archisolabel=MINTARCH quiet splash loglevel=3
    INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/x86_64/initramfs-linux.img

LABEL safe
    MENU LABEL Mint Arch Linux Live (Safe Mode / nomodeset)
    LINUX boot/x86_64/vmlinuz-linux
    APPEND archisobasedir=arch archisolabel=MINTARCH nomodeset
    INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/x86_64/initramfs-linux-fallback.img

LABEL memtest
    MENU LABEL Memory Test (memtest86+)
    LINUX boot/memtest86+/memtest.bin

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32
