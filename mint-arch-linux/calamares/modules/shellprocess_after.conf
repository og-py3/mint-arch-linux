---
# Mint OS — Post-install shell commands (runs in chroot)

script:
    - "-":  "echo 'Mint OS post-install configuration starting...'"

    # Enable essential services
    - "-":  "systemctl enable NetworkManager"
    - "-":  "systemctl enable sddm"
    - "-":  "systemctl enable bluetooth"
    - "-":  "systemctl enable cups"
    - "-":  "systemctl enable fstrim.timer"
    - "-":  "systemctl enable paccache.timer"
    - "-":  "systemctl enable reflector.timer"
    - "-":  "systemctl enable zram-setup"
    - "-":  "systemctl enable mint-performance"
    - "-":  "systemctl enable apparmor"
    - "-":  "systemctl enable ufw"
    - "-":  "systemctl enable fail2ban"
    - "-":  "systemctl enable docker"
    - "-":  "systemctl enable avahi-daemon"

    # Flatpak setup
    - "-":  "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo || true"

    # Configure Snapper for Btrfs (if btrfs root)
    - "-":  "if findmnt -n -o FSTYPE / | grep -q btrfs; then snapper -c root create-config / && systemctl enable snapper-timeline.timer snapper-cleanup.timer; fi || true"

    # Apply kernel performance tuning
    - "-":  "sysctl -p /etc/sysctl.d/99-mintos-performance.conf || true"

    # Firewall defaults
    - "-":  "ufw default deny incoming && ufw default allow outgoing && ufw --force enable || true"

    # Copy Mint OS branding
    - "-":  "cp -r /usr/share/mint-os/. /usr/share/mint-os/ 2>/dev/null || true"

    # Set Kvantum theme
    - "-":  "mkdir -p /etc/xdg && cp /usr/share/kvantum/MintOS/MintOS.kvconfig /usr/share/kvantum/MintOS/ 2>/dev/null || true"

    # Plymouth
    - "-":  "plymouth-set-default-theme -R mintos 2>/dev/null || true"

    # Update GRUB with Plymouth
    - "-":  "sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT=\"/GRUB_CMDLINE_LINUX_DEFAULT=\"quiet splash loglevel=3 rd.udev.log_priority=3 vt.global_cursor_default=0 /' /etc/default/grub 2>/dev/null || true"
    - "-":  "grub-mkconfig -o /boot/grub/grub.cfg 2>/dev/null || true"

    # Rebuild initramfs with Plymouth
    - "-":  "mkinitcpio -P 2>/dev/null || true"

    # Configure zsh for all users
    - "-":  "chsh -s /usr/bin/zsh root 2>/dev/null || true"

    - "-":  "echo 'Mint OS post-install complete.'"

timeout: 600
