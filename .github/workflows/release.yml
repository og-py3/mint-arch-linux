name: Release Mint Arch Linux

on:
  push:
    tags:
      - 'v*.*'
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date +%m)" >> $GITHUB_OUTPUT
          # Determine if pre-release
          if echo "$TAG" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "channel=beta" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs libisoburn \
            squashfs-tools mtools grub efibootmgr \
            syslinux curl wget git

      - name: Set file permissions
        working-directory: mint-arch-linux
        run: |
          chmod +x build.sh
          chmod +x airootfs/usr/local/bin/mint-* 2>/dev/null || true
          chmod 440 airootfs/etc/sudoers.d/mintarch 2>/dev/null || true

      - name: Build ISO
        working-directory: mint-arch-linux
        env:
          OUT_DIR: /tmp/output
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: ./build.sh --output /tmp/output

      - name: Generate checksums
        id: checksum
        run: |
          ISO=$(ls /tmp/output/mintarch-*.iso 2>/dev/null | head -1)
          echo "iso_path=$ISO" >> $GITHUB_OUTPUT
          echo "iso_name=$(basename $ISO)" >> $GITHUB_OUTPUT
          echo "iso_size=$(du -sh $ISO | cut -f1)" >> $GITHUB_OUTPUT

          SHA256=$(sha256sum $ISO | cut -d' ' -f1)
          MD5=$(md5sum $ISO | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT

          # Write checksum files
          echo "$SHA256  $(basename $ISO)" > /tmp/output/mintarch-${{ steps.version.outputs.tag }}-SHA256SUM
          echo "$MD5  $(basename $ISO)"   > /tmp/output/mintarch-${{ steps.version.outputs.tag }}-MD5SUM

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..${{ steps.version.outputs.tag }} --oneline --no-decorate 2>/dev/null | head -30 | sed 's/^/- /' || echo "- Initial release")
          else
            LOG="- Initial release of Mint Arch Linux"
          fi
          # Write to file to handle multiline
          echo "$LOG" > /tmp/changelog.txt
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Mint Arch Linux ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.date }})"
          prerelease: ${{ steps.version.outputs.prerelease }}
          draft: false
          body: |
            # Mint Arch Linux ${{ steps.version.outputs.tag }}

            > Rolling Arch Linux distribution — KDE Plasma 6 · Security Tools · Browser Desktop

            ---

            ## What's New

            $(cat /tmp/changelog.txt)

            ---

            ## ISO Details

            | Property | Value |
            |---|---|
            | **Version** | ${{ steps.version.outputs.tag }} |
            | **Build Date** | ${{ steps.version.outputs.date }} |
            | **Channel** | ${{ steps.version.outputs.channel }} |
            | **ISO Size** | ${{ steps.checksum.outputs.iso_size }} |
            | **SHA256** | `${{ steps.checksum.outputs.sha256 }}` |
            | **MD5** | `${{ steps.checksum.outputs.md5 }}` |

            ---

            ## Installation

            ### Flash to USB (Linux/Mac)
            ```bash
            sudo dd if=${{ steps.checksum.outputs.iso_name }} of=/dev/sdX bs=4M status=progress oflag=sync
            ```

            ### Windows
            Use **Rufus**, **balenaEtcher**, or **Ventoy**

            ### VirtualBox / VMware
            ```
            New VM → Arch Linux 64-bit → Enable EFI → 4GB RAM → Attach ISO → Boot
            sudo mint-installer
            ```

            ---

            ## Included Tools (pre-installed)

            | Category | Tools |
            |---|---|
            | Network Scanning | nmap, masscan, netdiscover, arp-scan |
            | Web Testing | sqlmap, nikto, gobuster, ffuf, burpsuite |
            | Password Cracking | hashcat, john, hydra, medusa |
            | Wireless | aircrack-ng, kismet, wireshark, bettercap |
            | Exploitation | metasploit, exploitdb, pwntools |
            | Forensics | autopsy, volatility3, binwalk, exiftool |
            | Reverse Eng | radare2, ghidra, gdb, pwndbg |
            | OSINT | maltego, sherlock, theharvester, amass |
            | Defensive | snort, suricata, rkhunter, lynis |

            > **2800+ more tools** available instantly via:
            > ```bash
            > sudo mint-tools-setup   # interactive menu
            > pacman -S blackarch      # install everything
            > ```

            ---

            ## Try in Browser (no install needed)

            [![Open in GitHub Codespaces](https://github.com/codespaces/badge.svg)](https://codespaces.new/og-py3/mint-arch-linux)

            ---

            *Built with ❤️ on Arch Linux · Powered by BlackArch · KDE Plasma 6*
          files: |
            /tmp/output/mintarch-*.iso
            /tmp/output/mintarch-${{ steps.version.outputs.tag }}-SHA256SUM
            /tmp/output/mintarch-${{ steps.version.outputs.tag }}-MD5SUM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**ISO:** ${{ steps.checksum.outputs.iso_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.checksum.outputs.iso_size }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256:** \`${{ steps.checksum.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/og-py3/mint-arch-linux/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
