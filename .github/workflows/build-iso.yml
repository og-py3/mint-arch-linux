name: Build Mint Arch Linux ISO

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mint-arch-linux/**'
      - '!mint-arch-linux/docs/**'
      - '!mint-arch-linux/*.md'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel'
        required: true
        default: 'stable'
        type: choice
        options: [ stable, beta, nightly ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring

      - name: Install build dependencies
        run: |
          pacman -Su --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs libisoburn \
            squashfs-tools mtools grub efibootmgr \
            syslinux curl wget git

      - name: Set up BlackArch repository
        run: |
          curl -fsSL https://blackarch.org/strap.sh -o /tmp/strap.sh
          chmod +x /tmp/strap.sh
          bash /tmp/strap.sh || true
          pacman -Sy --noconfirm 2>/dev/null || true

      - name: Set file permissions
        working-directory: mint-arch-linux
        run: |
          chmod +x build.sh
          chmod +x airootfs/usr/local/bin/mint-* 2>/dev/null || true
          chmod 440 airootfs/etc/sudoers.d/mintarch 2>/dev/null || true

      - name: Build ISO
        working-directory: mint-arch-linux
        env:
          OUT_DIR: /tmp/output
          CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
          CI: "true"
        run: ./build.sh --output /tmp/output --ci

      - name: Get ISO info
        id: iso
        run: |
          ISO=$(ls /tmp/output/mintarch-*.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: No ISO found in /tmp/output" >&2
            ls -la /tmp/output/ 2>/dev/null || true
            exit 1
          fi
          echo "path=$ISO" >> $GITHUB_OUTPUT
          echo "name=$(basename $ISO)" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $ISO | cut -f1)" >> $GITHUB_OUTPUT
          SHA256=$(sha256sum $ISO | cut -d" " -f1)
          MD5=$(md5sum $ISO | cut -d" " -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          sha256sum $ISO | sed "s|$ISO|$(basename $ISO)|" > /tmp/output/SHA256SUM
          md5sum    $ISO | sed "s|$ISO|$(basename $ISO)|" > /tmp/output/MD5SUM

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: mintarch-iso-${{ github.run_number }}
          path: |
            /tmp/output/mintarch-*.iso
            /tmp/output/SHA256SUM
            /tmp/output/MD5SUM
          retention-days: 14

      - name: Publish nightly release (main branch only)
        if: github.ref == "refs/heads/main"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Mint Arch Linux - Nightly Build #${{ github.run_number }}"
          prerelease: true
          draft: false
          make_latest: false
          body: |
            # Mint Arch Linux - Nightly Build

            > Auto-generated from the latest commit on `main`. Not production-ready.
            > Use a [stable release](https://github.com/og-py3/mint-arch-linux/releases/latest) for everyday use.

            ## Build Info

            | | |
            |---|---|
            | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | **Commit** | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
            | **ISO** | `${{ steps.iso.outputs.name }}` |
            | **Size** | ${{ steps.iso.outputs.size }} |
            | **SHA256** | `${{ steps.iso.outputs.sha256 }}` |
            | **MD5** | `${{ steps.iso.outputs.md5 }}` |

            *Built on Arch Linux · Powered by BlackArch · KDE Plasma 6*
          files: |
            /tmp/output/mintarch-*.iso
            /tmp/output/SHA256SUM
            /tmp/output/MD5SUM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **ISO** | ${{ steps.iso.outputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.iso.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA256** | `${{ steps.iso.outputs.sha256 }}` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To publish a stable release:" >> $GITHUB_STEP_SUMMARY
          echo "git tag v2026.06 && git push origin v2026.06" >> $GITHUB_STEP_SUMMARY