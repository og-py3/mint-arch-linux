name: Build Mint Arch Linux ISO

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel'
        required: true
        default: 'stable'
        type: choice
        options: [ stable, beta, nightly ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs libisoburn \
            squashfs-tools mtools grub efibootmgr \
            syslinux curl wget

      - name: Set file permissions
        working-directory: mint-arch-linux
        run: |
          chmod +x build.sh
          chmod +x airootfs/usr/local/bin/mint-* 2>/dev/null || true
          chmod 440 airootfs/etc/sudoers.d/mintarch 2>/dev/null || true

      - name: Build ISO
        working-directory: mint-arch-linux
        env:
          OUT_DIR: /tmp/output
          CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
        run: ./build.sh --output /tmp/output

      - name: Get ISO info
        id: iso
        run: |
          ISO=$(ls /tmp/output/mintarch-*.iso 2>/dev/null | head -1)
          echo "name=$(basename $ISO)" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $ISO | cut -f1)" >> $GITHUB_OUTPUT
          echo "sha256=$(sha256sum $ISO | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: mintarch-iso-${{ github.run_number }}
          path: /tmp/output/mintarch-*.iso
          retention-days: 7

      - name: Build summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **ISO** | ${{ steps.iso.outputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.iso.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA256** | \`${{ steps.iso.outputs.sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To create a release, push a version tag:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git tag v2025.05" >> $GITHUB_STEP_SUMMARY
          echo "git push origin v2025.05" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
